<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SIGMA SIX | Treasury Management</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00ffcc;
            --primary-dark: #00ccaa;
            --secondary: #9d4edd;
            --secondary-dark: #7b2cbf;
            --bg-dark: #0a0b10;
            --bg-card: #0f1119;
            --bg-elevated: #151823;
            --text: #ffffff;
            --text-muted: #8b8d9b;
            --border: rgba(0, 255, 204, 0.2);
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff4d4d;
            --info: #3b82f6;
            --gradient: linear-gradient(135deg, #00ffcc, #9d4edd, #ff2a6d);
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .admin-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .admin-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(0,255,204,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(157,78,221,0.08) 0%, transparent 50%);
            animation: bgPulse 10s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .rainbow-border {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient);
            background-size: 400% 400%;
            animation: rainbow 8s ease infinite;
            z-index: 1000;
        }

        @keyframes rainbow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 24px;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo-area h1 {
            font-size: 28px;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-area p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .back-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 10px 24px;
            border-radius: 40px;
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .back-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateX(-5px);
        }

        .wallet-status {
            background: var(--bg-card);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .creator-badge {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            color: #000;
        }

        .wallet-address {
            font-family: monospace;
            font-size: 13px;
            color: var(--primary);
        }

        .disconnect-btn {
            background: rgba(255,77,77,0.15);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .disconnect-btn:hover {
            background: var(--danger);
            color: #fff;
        }

        .treasury-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .treasury-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.4s ease;
            animation: fadeInUp 0.6s ease forwards;
        }

        .treasury-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,255,204,0.1);
        }

        .card-header {
            background: linear-gradient(135deg, rgba(0,255,204,0.1), rgba(157,78,221,0.1));
            padding: 24px 28px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .card-header h2 {
            font-size: 24px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .card-header h2 i {
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 28px;
        }

        .card-header p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .card-body {
            padding: 28px;
        }

        .balance-info {
            background: var(--bg-elevated);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .balance-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .balance-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
        }

        .balance-value small {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-muted);
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .input-group label i {
            color: var(--primary);
            font-size: 14px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 4px 16px;
            transition: all 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0,255,204,0.1);
        }

        .input-wrapper i {
            color: var(--text-muted);
            font-size: 18px;
        }

        .input-wrapper input {
            background: transparent;
            border: none;
            padding: 14px 12px;
            color: var(--text);
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            outline: none;
        }

        .amount-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .quick-amount {
            background: rgba(0,255,204,0.1);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.3s;
        }

        .quick-amount:hover {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }

        .approval-section {
            background: var(--bg-elevated);
            border-radius: 16px;
            padding: 16px;
            margin: 18px 0;
            border: 1px solid var(--border);
            display: none;
        }

        .approval-steps {
            display: flex;
            gap: 16px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .step-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 40px;
            background: rgba(255,255,255,0.05);
        }

        .step-badge.completed {
            background: rgba(0,255,136,0.15);
            color: var(--success);
        }

        .step-badge.active {
            background: rgba(0,255,204,0.15);
            border: 1px solid var(--primary);
        }

        .step-number {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--text-muted);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
        }

        .step-badge.completed .step-number {
            background: var(--success);
        }

        .step-badge.active .step-number {
            background: var(--primary);
        }

        .submit-btn {
            width: 100%;
            background: var(--gradient);
            border: none;
            padding: 16px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 16px;
            color: #000;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }

        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(0,255,204,0.3);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .withdraw-btn {
            background: linear-gradient(135deg, #ff4d4d, #cc0000);
        }

        .status-msg {
            margin-top: 18px;
            padding: 12px;
            border-radius: 14px;
            font-size: 12px;
            text-align: center;
            display: none;
        }

        .status-msg.success {
            background: rgba(0,255,136,0.1);
            border: 1px solid var(--success);
            color: var(--success);
            display: block;
        }

        .status-msg.error {
            background: rgba(255,77,77,0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            display: block;
        }

        .status-msg.loading {
            background: rgba(0,255,204,0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            display: block;
        }

        .info-note {
            margin-top: 20px;
            padding: 12px;
            background: rgba(0,255,204,0.05);
            border-radius: 14px;
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-note i {
            color: var(--primary);
            font-size: 14px;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            text-align: center;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .access-denied {
            text-align: center;
            padding: 60px 20px;
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border);
        }

        .access-denied i {
            font-size: 64px;
            color: var(--danger);
            margin-bottom: 20px;
        }

        .loading-spinner {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 900px) {
            .treasury-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            .container {
                padding: 20px 16px;
            }
            .card-header h2 {
                font-size: 20px;
            }
            .balance-value {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-bg"></div>
    <div class="floating-particles" id="particles"></div>
    <div class="rainbow-border"></div>

    <div class="container">
        <div class="header">
            <div class="logo-area">
                <h1><i class="fas fa-landmark"></i> SIGMA SIX | TREASURY</h1>
                <p>Admin Tools • Add & Withdraw USDT</p>
            </div>
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>
                <div class="wallet-status" id="walletStatus">
                    <div class="creator-badge" id="creatorBadge" style="display: none;">
                        <i class="fas fa-key"></i> CREATOR
                    </div>
                    <span class="wallet-address" id="walletAddress">Not Connected</span>
                    <button class="disconnect-btn" id="disconnectBtn" onclick="disconnectWallet()" style="display: none;">
                        <i class="fas fa-sign-out-alt"></i> Disconnect
                    </button>
                </div>
            </div>
        </div>

        <div id="pageContent">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Connecting to Blockchain...</p>
            </div>
        </div>

        <div class="footer">
            <p><i class="fas fa-shield-alt"></i> Secure Admin Panel • Only Creator Access</p>
        </div>
    </div>

    <script>
        // ============ UPDATED CONTRACT ADDRESS ============
        const SIGMA_ADDRESS = "0xaF215838d156F7d348A6d56cA962cbC680A2153F";
        const USDT_ADDRESS = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";
        const CREATOR_ADDRESS = "0xDf572e4D93582a9b2EEA65BDb0C588FB5fD4EC4b".toLowerCase();

        // ============ FULL ABI FROM PROVIDED CONTRACT ============
        const SIGMA_ABI = [
            "function addTreasury(uint256 _amt) external",
            "function emergencyWithdrawTreasury(uint256 _amt) external",
            "function creator() view returns (address)",
            "function usdt() view returns (address)",
            "function balanceOf(address) view returns (uint256)"
        ];

        const USDT_ABI = [
            "function balanceOf(address) view returns (uint256)",
            "function allowance(address,address) view returns (uint256)",
            "function approve(address,uint256) returns (bool)",
            "function transfer(address,uint256) returns (bool)"
        ];

        let provider, signer, userAddress;
        let sigmaContract, usdtContract;
        let isCreator = false;
        let currentUSDTBalance = 0;
        let currentTreasuryBalance = 0;
        let isApprovedForAdd = false;

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = 12 + Math.random() * 20 + 's';
                particle.style.animationDelay = Math.random() * 20 + 's';
                container.appendChild(particle);
            }
        }

        async function connectWallet() {
            if (!window.ethereum) {
                alert("MetaMask not installed!");
                window.open("https://metamask.io/download/", "_blank");
                return;
            }

            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                userAddress = accounts[0].toLowerCase();
                signer = await provider.getSigner();
                
                sigmaContract = new ethers.Contract(SIGMA_ADDRESS, SIGMA_ABI, signer);
                usdtContract = new ethers.Contract(USDT_ADDRESS, USDT_ABI, signer);
                
                const contractCreator = await sigmaContract.creator();
                isCreator = userAddress === contractCreator.toLowerCase();
                
                updateUIForCreator();
                
                if (isCreator) {
                    await loadData();
                    renderTreasuryPanel();
                } else {
                    showAccessDenied();
                }
                
                window.ethereum.on('accountsChanged', handleAccountsChanged);
                
            } catch (error) {
                console.error("Connection error:", error);
                alert("Failed to connect: " + error.message);
            }
        }

        function handleAccountsChanged(accounts) {
            if (accounts.length > 0) {
                userAddress = accounts[0].toLowerCase();
                if (userAddress === CREATOR_ADDRESS) {
                    isCreator = true;
                    updateUIForCreator();
                    loadData().then(() => renderTreasuryPanel());
                } else {
                    isCreator = false;
                    updateUIForCreator();
                    showAccessDenied();
                }
            } else {
                disconnectWallet();
            }
        }

        function updateUIForCreator() {
            const creatorBadge = document.getElementById('creatorBadge');
            const disconnectBtn = document.getElementById('disconnectBtn');
            const walletAddressSpan = document.getElementById('walletAddress');
            
            if (isCreator && userAddress) {
                creatorBadge.style.display = 'flex';
                disconnectBtn.style.display = 'flex';
                walletAddressSpan.textContent = userAddress.slice(0, 8) + '...' + userAddress.slice(-6);
                walletAddressSpan.style.color = '#00ffcc';
            } else if (userAddress) {
                creatorBadge.style.display = 'none';
                disconnectBtn.style.display = 'flex';
                walletAddressSpan.textContent = userAddress.slice(0, 8) + '...' + userAddress.slice(-6);
                walletAddressSpan.style.color = '#ffaa00';
            } else {
                creatorBadge.style.display = 'none';
                disconnectBtn.style.display = 'none';
                walletAddressSpan.textContent = 'Not Connected';
                walletAddressSpan.style.color = '#8b8d9b';
            }
        }

        function disconnectWallet() {
            userAddress = null;
            isCreator = false;
            updateUIForCreator();
            showConnectPrompt();
        }

        function showConnectPrompt() {
            const content = document.getElementById('pageContent');
            content.innerHTML = `
                <div class="access-denied">
                    <i class="fas fa-user-lock"></i>
                    <h2>Admin Access Required</h2>
                    <p>Please connect with the Creator Wallet to access treasury tools</p>
                    <button class="submit-btn" style="margin-top: 24px; width: auto; padding: 12px 32px;" onclick="connectWallet()">
                        <i class="fas fa-wallet"></i> Connect Wallet
                    </button>
                </div>
            `;
        }

        function showAccessDenied() {
            const content = document.getElementById('pageContent');
            content.innerHTML = `
                <div class="access-denied">
                    <i class="fas fa-ban"></i>
                    <h2>Access Denied</h2>
                    <p>You are not authorized to access this page.</p>
                    <p style="margin-top: 8px; font-size: 12px;">Only the Creator wallet has admin privileges.</p>
                    <button class="submit-btn" style="margin-top: 20px; width: auto; padding: 12px 32px; background: var(--danger);" onclick="disconnectWallet()">
                        <i class="fas fa-sign-out-alt"></i> Disconnect
                    </button>
                </div>
            `;
        }

        async function loadData() {
            try {
                const usdtBalance = await usdtContract.balanceOf(userAddress);
                currentUSDTBalance = parseFloat(ethers.formatUnits(usdtBalance, 6));
                
                const treasuryBalance = await usdtContract.balanceOf(SIGMA_ADDRESS);
                currentTreasuryBalance = parseFloat(ethers.formatUnits(treasuryBalance, 6));
                
                const allowance = await usdtContract.allowance(userAddress, SIGMA_ADDRESS);
                const allowanceNum = parseFloat(ethers.formatUnits(allowance, 6));
                isApprovedForAdd = allowanceNum > 0;
                
            } catch (error) {
                console.error("Error loading data:", error);
            }
        }

        // ========== ADD TREASURY FUNCTIONS ==========
        async function checkAllowance(amount) {
            try {
                const allowance = await usdtContract.allowance(userAddress, SIGMA_ADDRESS);
                const allowanceNum = parseFloat(ethers.formatUnits(allowance, 6));
                return allowanceNum >= amount - 0.001;
            } catch (error) {
                console.error("Allowance check error:", error);
                return false;
            }
        }

        async function approveUSDT(amount) {
            const statusDiv = document.getElementById('addTreasuryStatus');
            const btn = document.querySelector('#addCard .submit-btn');
            
            try {
                const amountWei = ethers.parseUnits(amount.toString(), 6);
                showStatus(statusDiv, 'loading', 'Approving USDT...');
                btn.disabled = true;
                
                const tx = await usdtContract.approve(SIGMA_ADDRESS, amountWei);
                showStatus(statusDiv, 'loading', 'Waiting for confirmation...');
                await tx.wait();
                
                isApprovedForAdd = true;
                showStatus(statusDiv, 'success', '✅ USDT Approved! You can now add to treasury.');
                setTimeout(() => statusDiv.style.display = 'none', 3000);
                updateApprovalUI(true);
                btn.disabled = false;
            } catch (error) {
                console.error("Approve error:", error);
                showStatus(statusDiv, 'error', `❌ Approval failed: ${error.message.slice(0, 100)}`);
                btn.disabled = false;
            }
        }

        async function addToTreasury() {
            const amountInput = document.getElementById('treasuryAmount');
            const amount = parseFloat(amountInput.value);
            const statusDiv = document.getElementById('addTreasuryStatus');
            const btn = document.querySelector('#addCard .submit-btn');
            
            if (isNaN(amount) || amount <= 0) {
                showStatus(statusDiv, 'error', 'Please enter a valid amount');
                return;
            }
            if (amount > currentUSDTBalance) {
                showStatus(statusDiv, 'error', `Insufficient USDT balance. You have ${currentUSDTBalance.toFixed(2)} USDT`);
                return;
            }
            
            const isAllowed = await checkAllowance(amount);
            if (!isAllowed) {
                await approveUSDT(amount);
                const newAllowance = await checkAllowance(amount);
                if (!newAllowance) return;
            }
            
            try {
                const amountWei = ethers.parseUnits(amount.toString(), 6);
                showStatus(statusDiv, 'loading', 'Adding to treasury...');
                btn.disabled = true;
                
                const tx = await sigmaContract.addTreasury(amountWei);
                showStatus(statusDiv, 'loading', 'Waiting for confirmation...');
                await tx.wait();
                
                showStatus(statusDiv, 'success', `✅ Successfully added ${amount.toFixed(2)} USDT to treasury!`);
                await loadData();
                updateBalanceDisplay();
                amountInput.value = '';
                isApprovedForAdd = false;
                updateApprovalUI(false);
                setTimeout(() => statusDiv.style.display = 'none', 5000);
                btn.disabled = false;
            } catch (error) {
                console.error("Treasury add error:", error);
                let errorMsg = error.message.includes("user rejected") ? "Transaction rejected" : error.message.slice(0, 100);
                showStatus(statusDiv, 'error', `❌ Failed: ${errorMsg}`);
                btn.disabled = false;
            }
        }

        // ========== WITHDRAW TREASURY (emergencyWithdrawTreasury) ==========
        async function withdrawFromTreasury() {
            const amountInput = document.getElementById('withdrawAmount');
            const amount = parseFloat(amountInput.value);
            const statusDiv = document.getElementById('withdrawTreasuryStatus');
            const btn = document.querySelector('#withdrawCard .submit-btn');
            
            if (isNaN(amount) || amount <= 0) {
                showStatus(statusDiv, 'error', 'Please enter a valid withdrawal amount');
                return;
            }
            if (amount > currentTreasuryBalance) {
                showStatus(statusDiv, 'error', `Insufficient treasury balance. Available: ${currentTreasuryBalance.toFixed(2)} USDT`);
                return;
            }
            
            try {
                const amountWei = ethers.parseUnits(amount.toString(), 6);
                showStatus(statusDiv, 'loading', 'Withdrawing from treasury...');
                btn.disabled = true;
                
                const tx = await sigmaContract.emergencyWithdrawTreasury(amountWei);
                showStatus(statusDiv, 'loading', 'Waiting for confirmation...');
                await tx.wait();
                
                showStatus(statusDiv, 'success', `✅ Successfully withdrew ${amount.toFixed(2)} USDT from treasury to creator wallet!`);
                await loadData();
                updateBalanceDisplay();
                amountInput.value = '';
                setTimeout(() => statusDiv.style.display = 'none', 5000);
                btn.disabled = false;
            } catch (error) {
                console.error("Withdraw error:", error);
                let errorMsg = error.message.includes("user rejected") ? "Transaction rejected" : error.message.slice(0, 100);
                showStatus(statusDiv, 'error', `❌ Withdrawal failed: ${errorMsg}`);
                btn.disabled = false;
            }
        }

        function updateApprovalUI(approved) {
            const approvalSection = document.getElementById('approvalSection');
            const step1 = document.getElementById('step1');
            const step2 = document.getElementById('step2');
            if (approvalSection) {
                approvalSection.style.display = approved ? 'none' : 'block';
            }
            if (step1 && step2) {
                if (approved) {
                    step1.classList.add('completed');
                    step1.classList.remove('active');
                    step2.classList.add('active');
                    step2.classList.remove('completed');
                } else {
                    step1.classList.remove('completed');
                    step1.classList.add('active');
                    step2.classList.remove('active', 'completed');
                }
            }
        }

        function updateBalanceDisplay() {
            const userSpan = document.getElementById('userBalance');
            const treasurySpan = document.getElementById('treasuryBalance');
            if (userSpan) userSpan.textContent = currentUSDTBalance.toFixed(2);
            if (treasurySpan) treasurySpan.textContent = currentTreasuryBalance.toFixed(2);
        }

        function setQuickAmount(amount) {
            const input = document.getElementById('treasuryAmount');
            if (input) input.value = amount;
        }

        function setQuickWithdrawAmount(amount) {
            const input = document.getElementById('withdrawAmount');
            if (input) input.value = amount;
        }

        function showStatus(element, type, message) {
            if (!element) return;
            element.textContent = message;
            element.className = `status-msg ${type}`;
            element.style.display = 'block';
        }

        function renderTreasuryPanel() {
            const content = document.getElementById('pageContent');
            content.innerHTML = `
                <div class="treasury-grid">
                    <!-- ADD TREASURY CARD -->
                    <div class="treasury-card" id="addCard">
                        <div class="card-header">
                            <h2><i class="fas fa-coins"></i> Add to Treasury</h2>
                            <p>Deposit USDT directly to contract treasury</p>
                        </div>
                        <div class="card-body">
                            <div class="balance-info">
                                <div class="balance-label"><i class="fas fa-wallet"></i> Your USDT Balance</div>
                                <div class="balance-value" id="userBalance">${currentUSDTBalance.toFixed(2)} <small>USDT</small></div>
                            </div>
                            <div class="balance-info" style="margin-top: 12px;">
                                <div class="balance-label"><i class="fas fa-landmark"></i> Current Treasury Balance</div>
                                <div class="balance-value" id="treasuryBalance">${currentTreasuryBalance.toFixed(2)} <small>USDT</small></div>
                            </div>
                            
                            <div class="input-group">
                                <label><i class="fas fa-dollar-sign"></i> Amount to Add (USDT)</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-coins"></i>
                                    <input type="number" id="treasuryAmount" placeholder="0.00" step="any">
                                </div>
                                <div class="amount-actions">
                                    <span class="quick-amount" onclick="setQuickAmount(100)">100 USDT</span>
                                    <span class="quick-amount" onclick="setQuickAmount(500)">500 USDT</span>
                                    <span class="quick-amount" onclick="setQuickAmount(1000)">1000 USDT</span>
                                    <span class="quick-amount" onclick="setQuickAmount(5000)">5000 USDT</span>
                                </div>
                            </div>
                            
                            <div class="approval-section" id="approvalSection">
                                <div class="approval-steps">
                                    <div class="step-badge active" id="step1">
                                        <div class="step-number">1</div>
                                        <span>Approve USDT</span>
                                    </div>
                                    <i class="fas fa-arrow-right" style="color: var(--text-muted);"></i>
                                    <div class="step-badge" id="step2">
                                        <div class="step-number">2</div>
                                        <span>Add to Treasury</span>
                                    </div>
                                </div>
                            </div>
                            
                            <button class="submit-btn" onclick="addToTreasury()">
                                <i class="fas fa-plus-circle"></i> Add to Treasury
                            </button>
                            <div id="addTreasuryStatus" class="status-msg"></div>
                            <div class="info-note">
                                <i class="fas fa-info-circle"></i>
                                <span>Transfers USDT from your wallet to contract treasury. Only Creator can perform this.</span>
                            </div>
                        </div>
                    </div>

                    <!-- WITHDRAW TREASURY CARD -->
                    <div class="treasury-card" id="withdrawCard">
                        <div class="card-header">
                            <h2><i class="fas fa-hand-holding-usd"></i> Withdraw from Treasury</h2>
                            <p>Emergency withdrawal of USDT funds</p>
                        </div>
                        <div class="card-body">
                            <div class="balance-info">
                                <div class="balance-label"><i class="fas fa-piggy-bank"></i> Available Treasury Balance</div>
                                <div class="balance-value" id="withdrawTreasuryBalance">${currentTreasuryBalance.toFixed(2)} <small>USDT</small></div>
                            </div>
                            
                            <div class="input-group">
                                <label><i class="fas fa-dollar-sign"></i> Amount to Withdraw (USDT)</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-money-bill-wave"></i>
                                    <input type="number" id="withdrawAmount" placeholder="0.00" step="any">
                                </div>
                                <div class="amount-actions">
                                    <span class="quick-amount" onclick="setQuickWithdrawAmount(100)">100 USDT</span>
                                    <span class="quick-amount" onclick="setQuickWithdrawAmount(500)">500 USDT</span>
                                    <span class="quick-amount" onclick="setQuickWithdrawAmount(1000)">1000 USDT</span>
                                    <span class="quick-amount" onclick="setQuickWithdrawAmount(5000)">5000 USDT</span>
                                    <span class="quick-amount" onclick="setQuickWithdrawAmount(${currentTreasuryBalance.toFixed(0)})">MAX</span>
                                </div>
                            </div>
                            
                            <button class="submit-btn withdraw-btn" onclick="withdrawFromTreasury()">
                                <i class="fas fa-unlock-alt"></i> Emergency Withdraw
                            </button>
                            <div id="withdrawTreasuryStatus" class="status-msg"></div>
                            <div class="info-note">
                                <i class="fas fa-exclamation-triangle"></i>
                                <span>⚠️ Emergency function: Withdraws USDT directly to creator wallet. Only accessible by contract creator.</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Re-attach balance for withdraw card
            const withdrawTreasurySpan = document.getElementById('withdrawTreasuryBalance');
            if (withdrawTreasurySpan) withdrawTreasurySpan.textContent = currentTreasuryBalance.toFixed(2);
            
            // Update approval section visibility based on isApprovedForAdd
            if (!isApprovedForAdd) {
                const approvalDiv = document.getElementById('approvalSection');
                if (approvalDiv) approvalDiv.style.display = 'block';
            } else {
                updateApprovalUI(true);
            }
        }

        createParticles();
        
        window.onload = async () => {
            if (window.ethereum) {
                provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_accounts", []);
                if (accounts.length > 0) {
                    userAddress = accounts[0].toLowerCase();
                    signer = await provider.getSigner();
                    sigmaContract = new ethers.Contract(SIGMA_ADDRESS, SIGMA_ABI, signer);
                    usdtContract = new ethers.Contract(USDT_ADDRESS, USDT_ABI, signer);
                    
                    const contractCreator = await sigmaContract.creator();
                    isCreator = userAddress === contractCreator.toLowerCase();
                    
                    updateUIForCreator();
                    
                    if (isCreator) {
                        await loadData();
                        renderTreasuryPanel();
                    } else {
                        showAccessDenied();
                    }
                } else {
                    showConnectPrompt();
                }
            } else {
                showConnectPrompt();
            }
        };
    </script>
</body>
</html>
