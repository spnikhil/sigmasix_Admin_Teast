<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SIGMA SIX | Migrate & Free Mint</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00ffcc;
            --primary-dark: #00ccaa;
            --secondary: #9d4edd;
            --secondary-dark: #7b2cbf;
            --bg-dark: #0a0b10;
            --bg-card: #0f1119;
            --bg-elevated: #151823;
            --text: #ffffff;
            --text-muted: #8b8d9b;
            --border: rgba(0, 255, 204, 0.2);
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff4d4d;
            --info: #3b82f6;
            --gradient: linear-gradient(135deg, #00ffcc, #9d4edd, #ff2a6d);
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .admin-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .admin-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(0,255,204,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(157,78,221,0.08) 0%, transparent 50%);
            animation: bgPulse 10s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .rainbow-border {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient);
            background-size: 400% 400%;
            animation: rainbow 8s ease infinite;
            z-index: 1000;
        }

        @keyframes rainbow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 24px;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo-area h1 {
            font-size: 28px;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-area p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .back-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 10px 24px;
            border-radius: 40px;
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateX(-5px);
        }

        .wallet-status {
            background: var(--bg-card);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .creator-badge {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            color: #000;
        }

        .wallet-address {
            font-family: monospace;
            font-size: 13px;
            color: var(--primary);
        }

        .disconnect-btn {
            background: rgba(255,77,77,0.15);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .disconnect-btn:hover {
            background: var(--danger);
            color: #fff;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.4s ease;
            animation: fadeInUp 0.6s ease forwards;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,255,204,0.1);
        }

        .card-header {
            background: linear-gradient(135deg, rgba(0,255,204,0.1), rgba(157,78,221,0.1));
            padding: 24px 28px;
            border-bottom: 1px solid var(--border);
        }

        .card-header h2 {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-header h2 i {
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 28px;
        }

        .card-header p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .card-body {
            padding: 28px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .input-group label i {
            color: var(--primary);
            font-size: 14px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 4px 16px;
            transition: all 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0,255,204,0.1);
        }

        .input-wrapper i {
            color: var(--text-muted);
            font-size: 16px;
        }

        .input-wrapper input {
            background: transparent;
            border: none;
            padding: 16px 12px;
            color: var(--text);
            font-size: 14px;
            font-family: monospace;
            width: 100%;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
            font-family: 'Inter', monospace;
        }

        .paste-btn {
            background: rgba(0,255,204,0.1);
            border: none;
            color: var(--primary);
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .paste-btn:hover {
            background: var(--primary);
            color: #000;
        }

        .submit-btn {
            width: 100%;
            background: var(--gradient);
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 16px;
            color: #000;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }

        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(0,255,204,0.3);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .status-msg.success {
            background: rgba(0,255,136,0.1);
            border: 1px solid var(--success);
            color: var(--success);
            display: block;
        }

        .status-msg.error {
            background: rgba(255,77,77,0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            display: block;
        }

        .status-msg.loading {
            background: rgba(0,255,204,0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            display: block;
        }

        .info-note {
            margin-top: 20px;
            padding: 12px;
            background: rgba(0,255,204,0.05);
            border-radius: 12px;
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-note i {
            color: var(--primary);
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            text-align: center;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .access-denied {
            text-align: center;
            padding: 60px 20px;
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border);
        }

        .access-denied i {
            font-size: 64px;
            color: var(--danger);
            margin-bottom: 20px;
        }

        .loading-spinner {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="admin-bg"></div>
    <div class="floating-particles" id="particles"></div>
    <div class="rainbow-border"></div>

    <div class="container">
        <div class="header">
            <div class="logo-area">
                <h1><i class="fas fa-exchange-alt"></i> SIGMA SIX | MIGRATE</h1>
                <p>Admin Tools • User Migration & Free Mint</p>
            </div>
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <a href="admin.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
                <div class="wallet-status" id="walletStatus">
                    <div class="creator-badge" id="creatorBadge" style="display: none;">
                        <i class="fas fa-key"></i> CREATOR
                    </div>
                    <span class="wallet-address" id="walletAddress">Not Connected</span>
                    <button class="disconnect-btn" id="disconnectBtn" onclick="disconnectWallet()" style="display: none;">
                        <i class="fas fa-sign-out-alt"></i> Disconnect
                    </button>
                </div>
            </div>
        </div>

        <div id="pageContent">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Connecting to Blockchain...</p>
            </div>
        </div>

        <div class="footer">
            <p><i class="fas fa-shield-alt"></i> Secure Admin Panel • Only Creator Access</p>
        </div>
    </div>

    <script>
        const SIGMA_ADDRESS = "0x846339d474AE98b219111eb969E27b6317aE5852";
        const CREATOR_ADDRESS = "0xDf572e4D93582a9b2EEA65BDb0C588FB5fD4EC4b".toLowerCase();

        const SIGMA_ABI = [
            "function migrateUser(address _u, address _up, uint256 _bal) external",
            "function creatorFreeMint(address _to, uint256 _amt) external",
            "function balanceOf(address) view returns (uint256)",
            "function creator() view returns (address)",
            "function users(address) view returns (address upline, uint256 directCount, uint256 lastBuyTimestamp, uint256 totalReferralEarned, uint256 lastActionTime, bool hasBoughtBefore)"
        ];

        let provider, signer, userAddress;
        let sigmaContract;
        let isCreator = false;

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = 12 + Math.random() * 20 + 's';
                particle.style.animationDelay = Math.random() * 20 + 's';
                container.appendChild(particle);
            }
        }

        async function connectWallet() {
            if (!window.ethereum) {
                alert("MetaMask not installed!");
                window.open("https://metamask.io/download/", "_blank");
                return;
            }

            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                userAddress = accounts[0].toLowerCase();
                signer = await provider.getSigner();
                
                sigmaContract = new ethers.Contract(SIGMA_ADDRESS, SIGMA_ABI, signer);
                
                const contractCreator = await sigmaContract.creator();
                isCreator = userAddress === contractCreator.toLowerCase();
                
                updateUIForCreator();
                
                if (isCreator) {
                    renderAdminPanel();
                } else {
                    showAccessDenied();
                }
                
                window.ethereum.on('accountsChanged', handleAccountsChanged);
                
            } catch (error) {
                console.error("Connection error:", error);
                alert("Failed to connect: " + error.message);
            }
        }

        function handleAccountsChanged(accounts) {
            if (accounts.length > 0) {
                userAddress = accounts[0].toLowerCase();
                if (userAddress === CREATOR_ADDRESS) {
                    isCreator = true;
                    updateUIForCreator();
                    renderAdminPanel();
                } else {
                    isCreator = false;
                    updateUIForCreator();
                    showAccessDenied();
                }
            } else {
                disconnectWallet();
            }
        }

        function updateUIForCreator() {
            const creatorBadge = document.getElementById('creatorBadge');
            const disconnectBtn = document.getElementById('disconnectBtn');
            const walletAddressSpan = document.getElementById('walletAddress');
            
            if (isCreator && userAddress) {
                creatorBadge.style.display = 'flex';
                disconnectBtn.style.display = 'flex';
                walletAddressSpan.textContent = userAddress.slice(0, 8) + '...' + userAddress.slice(-6);
                walletAddressSpan.style.color = '#00ffcc';
            } else if (userAddress) {
                creatorBadge.style.display = 'none';
                disconnectBtn.style.display = 'flex';
                walletAddressSpan.textContent = userAddress.slice(0, 8) + '...' + userAddress.slice(-6);
                walletAddressSpan.style.color = '#ffaa00';
            } else {
                creatorBadge.style.display = 'none';
                disconnectBtn.style.display = 'none';
                walletAddressSpan.textContent = 'Not Connected';
                walletAddressSpan.style.color = '#8b8d9b';
            }
        }

        function disconnectWallet() {
            userAddress = null;
            isCreator = false;
            updateUIForCreator();
            showConnectPrompt();
        }

        function showConnectPrompt() {
            const content = document.getElementById('pageContent');
            content.innerHTML = `
                <div class="access-denied">
                    <i class="fas fa-user-lock"></i>
                    <h2>Admin Access Required</h2>
                    <p>Please connect with the Creator Wallet to access admin tools</p>
                    <button class="submit-btn" style="margin-top: 24px; width: auto; padding: 12px 32px;" onclick="connectWallet()">
                        <i class="fas fa-wallet"></i> Connect Wallet
                    </button>
                </div>
            `;
        }

        function showAccessDenied() {
            const content = document.getElementById('pageContent');
            content.innerHTML = `
                <div class="access-denied">
                    <i class="fas fa-ban"></i>
                    <h2>Access Denied</h2>
                    <p>You are not authorized to access this page.</p>
                    <p style="margin-top: 8px; font-size: 12px;">Only the Creator wallet has admin privileges.</p>
                    <button class="submit-btn" style="margin-top: 20px; width: auto; padding: 12px 32px; background: var(--danger);" onclick="disconnectWallet()">
                        <i class="fas fa-sign-out-alt"></i> Disconnect
                    </button>
                </div>
            `;
        }

        function renderAdminPanel() {
            const content = document.getElementById('pageContent');
            content.innerHTML = `
                <div class="cards-grid">
                    <!-- Migrate User Card -->
                    <div class="card">
                        <div class="card-header">
                            <h2><i class="fas fa-user-plus"></i> Migrate User</h2>
                            <p>Transfer user data from old contract to new contract</p>
                        </div>
                        <div class="card-body">
                            <div class="input-group">
                                <label><i class="fas fa-user"></i> User Wallet Address</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-wallet"></i>
                                    <input type="text" id="migrateUserAddr" placeholder="0x..." autocomplete="off">
                                    <button class="paste-btn" onclick="pasteAddress('migrateUserAddr')">Paste</button>
                                </div>
                            </div>
                            <div class="input-group">
                                <label><i class="fas fa-link"></i> Upline Wallet Address</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-users"></i>
                                    <input type="text" id="migrateUplineAddr" placeholder="0x... (optional)" autocomplete="off">
                                    <button class="paste-btn" onclick="pasteAddress('migrateUplineAddr')">Paste</button>
                                </div>
                            </div>
                            <div class="input-group">
                                <label><i class="fas fa-coins"></i> User Sigma Balance</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-chart-line"></i>
                                    <input type="number" id="migrateBalance" placeholder="Amount in SIG6" step="any">
                                </div>
                            </div>
                            <button class="submit-btn" onclick="migrateUser()">
                                <i class="fas fa-arrow-right"></i> Migrate User
                            </button>
                            <div id="migrateStatus" class="status-msg"></div>
                            <div class="info-note">
                                <i class="fas fa-info-circle"></i>
                                <span>Migrates user data including upline and balance from old contract. Balance should be in SIG6 (18 decimals).</span>
                            </div>
                        </div>
                    </div>

                    <!-- Free Mint Card -->
                    <div class="card">
                        <div class="card-header">
                            <h2><i class="fas fa-gift"></i> Free Mint (Creator Only)</h2>
                            <p>Mint free SIGMA tokens to any wallet</p>
                        </div>
                        <div class="card-body">
                            <div class="input-group">
                                <label><i class="fas fa-user"></i> Recipient Wallet Address</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-wallet"></i>
                                    <input type="text" id="mintRecipient" placeholder="0x..." autocomplete="off">
                                    <button class="paste-btn" onclick="pasteAddress('mintRecipient')">Paste</button>
                                </div>
                            </div>
                            <div class="input-group">
                                <label><i class="fas fa-coins"></i> Sigma Amount</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-chart-line"></i>
                                    <input type="number" id="mintAmount" placeholder="Amount in SIG6" step="any">
                                </div>
                            </div>
                            <button class="submit-btn" onclick="freeMint()">
                                <i class="fas fa-gift"></i> Mint Free SIGMA
                            </button>
                            <div id="mintStatus" class="status-msg"></div>
                            <div class="info-note">
                                <i class="fas fa-exclamation-triangle"></i>
                                <span>⚠️ Only Creator can mint. This will increase total supply. Use responsibly.</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function migrateUser() {
            const userAddr = document.getElementById('migrateUserAddr').value.trim();
            const uplineAddr = document.getElementById('migrateUplineAddr').value.trim() || "0x0000000000000000000000000000000000000000";
            const balanceStr = document.getElementById('migrateBalance').value.trim();
            
            const statusDiv = document.getElementById('migrateStatus');
            
            if (!userAddr) {
                showStatus(statusDiv, 'error', 'Please enter user wallet address');
                return;
            }
            
            if (!ethers.isAddress(userAddr)) {
                showStatus(statusDiv, 'error', 'Invalid user wallet address');
                return;
            }
            
            if (uplineAddr !== "0x0000000000000000000000000000000000000000" && !ethers.isAddress(uplineAddr)) {
                showStatus(statusDiv, 'error', 'Invalid upline wallet address');
                return;
            }
            
            let balance = 0;
            if (balanceStr) {
                balance = parseFloat(balanceStr);
                if (isNaN(balance) || balance < 0) {
                    showStatus(statusDiv, 'error', 'Invalid balance amount');
                    return;
                }
            }
            
            const balanceWei = ethers.parseEther(balance.toString());
            
            showStatus(statusDiv, 'loading', 'Processing migration...');
            
            try {
                const tx = await sigmaContract.migrateUser(userAddr, uplineAddr, balanceWei);
                showStatus(statusDiv, 'loading', 'Waiting for confirmation...');
                await tx.wait();
                showStatus(statusDiv, 'success', `✅ User ${userAddr.slice(0,8)}... migrated successfully!`);
                
                document.getElementById('migrateUserAddr').value = '';
                document.getElementById('migrateUplineAddr').value = '';
                document.getElementById('migrateBalance').value = '';
                
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 5000);
                
            } catch (error) {
                console.error("Migration error:", error);
                let errorMsg = error.message;
                if (errorMsg.includes("user rejected")) errorMsg = "Transaction rejected";
                if (errorMsg.includes("insufficient")) errorMsg = "Insufficient POL for gas";
                showStatus(statusDiv, 'error', `❌ Migration failed: ${errorMsg.slice(0, 100)}`);
            }
        }

        async function freeMint() {
            const recipient = document.getElementById('mintRecipient').value.trim();
            const amountStr = document.getElementById('mintAmount').value.trim();
            const statusDiv = document.getElementById('mintStatus');
            
            if (!recipient) {
                showStatus(statusDiv, 'error', 'Please enter recipient wallet address');
                return;
            }
            
            if (!ethers.isAddress(recipient)) {
                showStatus(statusDiv, 'error', 'Invalid recipient address');
                return;
            }
            
            if (!amountStr) {
                showStatus(statusDiv, 'error', 'Please enter amount to mint');
                return;
            }
            
            const amount = parseFloat(amountStr);
            if (isNaN(amount) || amount <= 0) {
                showStatus(statusDiv, 'error', 'Invalid amount');
                return;
            }
            
            const amountWei = ethers.parseEther(amount.toString());
            
            showStatus(statusDiv, 'loading', 'Processing free mint...');
            
            try {
                const tx = await sigmaContract.creatorFreeMint(recipient, amountWei);
                showStatus(statusDiv, 'loading', 'Waiting for confirmation...');
                await tx.wait();
                showStatus(statusDiv, 'success', `✅ Successfully minted ${amount} SIG6 to ${recipient.slice(0,8)}...`);
                
                document.getElementById('mintRecipient').value = '';
                document.getElementById('mintAmount').value = '';
                
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 5000);
                
            } catch (error) {
                console.error("Mint error:", error);
                let errorMsg = error.message;
                if (errorMsg.includes("user rejected")) errorMsg = "Transaction rejected";
                if (errorMsg.includes("insufficient")) errorMsg = "Insufficient POL for gas";
                if (errorMsg.includes("Only Creator")) errorMsg = "Only creator can mint tokens";
                showStatus(statusDiv, 'error', `❌ Mint failed: ${errorMsg.slice(0, 100)}`);
            }
        }

        function showStatus(element, type, message) {
            element.textContent = message;
            element.className = `status-msg ${type}`;
            element.style.display = 'block';
        }

        function pasteAddress(inputId) {
            navigator.clipboard.readText().then(text => {
                if (text && text.trim().startsWith('0x')) {
                    document.getElementById(inputId).value = text.trim();
                } else {
                    alert("Clipboard doesn't contain a valid address");
                }
            }).catch(() => {
                alert("Unable to read clipboard. Please paste manually.");
            });
        }

        createParticles();
        
        window.onload = async () => {
            if (window.ethereum) {
                provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_accounts", []);
                if (accounts.length > 0) {
                    userAddress = accounts[0].toLowerCase();
                    signer = await provider.getSigner();
                    sigmaContract = new ethers.Contract(SIGMA_ADDRESS, SIGMA_ABI, signer);
                    
                    const contractCreator = await sigmaContract.creator();
                    isCreator = userAddress === contractCreator.toLowerCase();
                    
                    updateUIForCreator();
                    
                    if (isCreator) {
                        renderAdminPanel();
                    } else {
                        showAccessDenied();
                    }
                } else {
                    showConnectPrompt();
                }
            } else {
                showConnectPrompt();
            }
        };
    </script>
</body>
</html>
