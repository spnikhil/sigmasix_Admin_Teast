<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SIGMA SIX | ADMIN DASHBOARD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00ffcc;
            --primary-dark: #00ccaa;
            --secondary: #9d4edd;
            --secondary-dark: #7b2cbf;
            --bg-dark: #0a0b10;
            --bg-card: #0f1119;
            --bg-elevated: #151823;
            --text: #ffffff;
            --text-muted: #8b8d9b;
            --border: rgba(0, 255, 204, 0.2);
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff4d4d;
            --info: #3b82f6;
            --gradient: linear-gradient(135deg, #00ffcc, #9d4edd, #ff2a6d);
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .admin-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .admin-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(0,255,204,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(157,78,221,0.08) 0%, transparent 50%);
            animation: bgPulse 10s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle-admin {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .rainbow-border {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient);
            background-size: 400% 400%;
            animation: rainbow 8s ease infinite;
            z-index: 1000;
        }

        @keyframes rainbow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 24px;
            position: relative;
            z-index: 1;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo-area h1 {
            font-size: 28px;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-area p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .wallet-status {
            background: var(--bg-card);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .creator-badge {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            color: #000;
        }

        .wallet-address {
            font-family: monospace;
            font-size: 13px;
            color: var(--primary);
        }

        .disconnect-btn {
            background: rgba(255,77,77,0.15);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .disconnect-btn:hover {
            background: var(--danger);
            color: #fff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
            box-shadow: 0 10px 25px rgba(0,255,204,0.1);
        }

        .stat-icon {
            font-size: 28px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            line-height: 1.2;
        }

        .stat-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .actions-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: var(--primary);
        }

        .actions-grid {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .action-btn-sm {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 13px;
            color: #000;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn-sm:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(0,255,204,0.3);
        }

        .daily-stats {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
        }

        .daily-stats h3 {
            font-size: 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .daily-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .daily-item {
            background: var(--bg-elevated);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s;
        }

        .daily-item:hover {
            transform: translateY(-2px);
            border: 1px solid var(--primary);
        }

        .daily-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .daily-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
        }

        .daily-unit {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: 4px;
        }

        .access-denied {
            text-align: center;
            padding: 60px 20px;
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border);
        }

        .access-denied i {
            font-size: 64px;
            color: var(--danger);
            margin-bottom: 20px;
        }

        .loading-spinner {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .admin-footer {
            margin-top: 40px;
            padding-top: 20px;
            text-align: center;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .admin-container { padding: 20px 16px; }
            .admin-header { flex-direction: column; text-align: center; }
            .stat-value { font-size: 22px; }
            .daily-value { font-size: 20px; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stat-card, .daily-item {
            animation: fadeInUp 0.5s ease forwards;
        }
    </style>
</head>
<body>
    <div class="admin-bg"></div>
    <div class="floating-particles" id="particles"></div>
    <div class="rainbow-border"></div>

    <div class="admin-container">
        <div class="admin-header">
            <div class="logo-area">
                <h1><i class="fas fa-crown"></i> SIGMA SIX ADMIN</h1>
                <p>Command Center • Premium Dashboard</p>
            </div>
            <div class="wallet-status" id="walletStatus">
                <div class="creator-badge" id="creatorBadge" style="display: none;">
                    <i class="fas fa-key"></i> CREATOR
                </div>
                <span class="wallet-address" id="walletAddress">Not Connected</span>
                <button class="disconnect-btn" id="disconnectBtn" onclick="disconnectWallet()" style="display: none;">
                    <i class="fas fa-sign-out-alt"></i> Disconnect
                </button>
            </div>
        </div>

        <div id="dashboardContent">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Connecting to Blockchain...</p>
            </div>
        </div>

        <div class="admin-footer">
            <p><i class="fas fa-shield-alt"></i> Secure Admin Panel • Only Creator Access</p>
        </div>
    </div>

    <script>
        const SIGMA_ADDRESS = "0x846339d474AE98b219111eb969E27b6317aE5852";
        const USDT_ADDRESS = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";
        const CREATOR_ADDRESS = "0xDf572e4D93582a9b2EEA65BDb0C588FB5fD4EC4b".toLowerCase();

        const SIGMA_ABI = [
            "function totalSupply() view returns (uint256)",
            "function balanceOf(address) view returns (uint256)",
            "function getCurrentBuyRate() view returns (uint256)",
            "function creator() view returns (address)",
            "function usdt() view returns (address)",
            "function users(address) view returns (address upline, uint256 directCount, uint256 lastBuyTimestamp, uint256 totalReferralEarned, uint256 lastActionTime, bool hasBoughtBefore)"
        ];

        const USDT_ABI = [
            "function balanceOf(address) view returns (uint256)",
            "function allowance(address,address) view returns (uint256)",
            "function approve(address,uint256) returns (bool)",
            "function transfer(address,uint256) returns (bool)"
        ];

        let provider, signer, userAddress;
        let sigmaContract, usdtContract;
        let isCreator = false;

        let realStats = {
            totalSupply: 0,
            treasuryBalance: 0,
            currentRate: 0,
            totalHolders: 0,
            todayBuy: 0,
            todaySell: 0,
            todayIncome: 0,
            todayLaps: 0,
            newReferrals: 0
        };

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle-admin';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = 12 + Math.random() * 20 + 's';
                particle.style.animationDelay = Math.random() * 20 + 's';
                container.appendChild(particle);
            }
        }

        async function connectWallet() {
            if (!window.ethereum) {
                alert("MetaMask not installed!");
                window.open("https://metamask.io/download/", "_blank");
                return;
            }

            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                userAddress = accounts[0].toLowerCase();
                signer = await provider.getSigner();
                
                sigmaContract = new ethers.Contract(SIGMA_ADDRESS, SIGMA_ABI, signer);
                usdtContract = new ethers.Contract(USDT_ADDRESS, USDT_ABI, signer);
                
                const contractCreator = await sigmaContract.creator();
                isCreator = userAddress === contractCreator.toLowerCase();
                
                updateUIForCreator();
                
                if (isCreator) {
                    await loadRealDashboardData();
                } else {
                    showAccessDenied();
                }
                
                window.ethereum.on('accountsChanged', handleAccountsChanged);
                
            } catch (error) {
                console.error("Connection error:", error);
                alert("Failed to connect: " + error.message);
            }
        }

        function handleAccountsChanged(accounts) {
            if (accounts.length > 0) {
                userAddress = accounts[0].toLowerCase();
                if (userAddress === CREATOR_ADDRESS) {
                    isCreator = true;
                    updateUIForCreator();
                    loadRealDashboardData();
                } else {
                    isCreator = false;
                    updateUIForCreator();
                    showAccessDenied();
                }
            } else {
                disconnectWallet();
            }
        }

        function updateUIForCreator() {
            const creatorBadge = document.getElementById('creatorBadge');
            const disconnectBtn = document.getElementById('disconnectBtn');
            const walletAddressSpan = document.getElementById('walletAddress');
            
            if (isCreator && userAddress) {
                creatorBadge.style.display = 'flex';
                disconnectBtn.style.display = 'flex';
                walletAddressSpan.textContent = userAddress.slice(0, 8) + '...' + userAddress.slice(-6);
                walletAddressSpan.style.color = '#00ffcc';
            } else if (userAddress) {
                creatorBadge.style.display = 'none';
                disconnectBtn.style.display = 'flex';
                walletAddressSpan.textContent = userAddress.slice(0, 8) + '...' + userAddress.slice(-6);
                walletAddressSpan.style.color = '#ffaa00';
            } else {
                creatorBadge.style.display = 'none';
                disconnectBtn.style.display = 'none';
                walletAddressSpan.textContent = 'Not Connected';
                walletAddressSpan.style.color = '#8b8d9b';
            }
        }

        function disconnectWallet() {
            userAddress = null;
            isCreator = false;
            updateUIForCreator();
            showConnectPrompt();
        }

        function showConnectPrompt() {
            const dashboard = document.getElementById('dashboardContent');
            dashboard.innerHTML = `
                <div class="access-denied">
                    <i class="fas fa-user-lock"></i>
                    <h2>Admin Access Required</h2>
                    <p>Please connect with the Creator Wallet to access the dashboard</p>
                    <button class="action-btn-sm" style="margin-top: 24px;" onclick="connectWallet()">
                        <i class="fas fa-wallet"></i> Connect Wallet
                    </button>
                </div>
            `;
        }

        function showAccessDenied() {
            const dashboard = document.getElementById('dashboardContent');
            dashboard.innerHTML = `
                <div class="access-denied">
                    <i class="fas fa-ban"></i>
                    <h2>Access Denied</h2>
                    <p>You are not authorized to access this dashboard.</p>
                    <p style="margin-top: 8px; font-size: 12px;">Only the Creator wallet has admin privileges.</p>
                    <button class="action-btn-sm" style="margin-top: 20px; background: var(--danger);" onclick="disconnectWallet()">
                        <i class="fas fa-sign-out-alt"></i> Disconnect
                    </button>
                </div>
            `;
        }

        async function getTotalHoldersFromEvents() {
            try {
                const totalSupply = await sigmaContract.totalSupply();
                if (totalSupply == 0) return 0;
                
                const filter = sigmaContract.filters.Transfer();
                const events = await sigmaContract.queryFilter(filter, 0, 'latest');
                const holders = new Map();
                
                for (const event of events) {
                    const from = event.args[0]?.toLowerCase();
                    const to = event.args[1]?.toLowerCase();
                    const value = event.args[2];
                    
                    if (from && from !== '0x0000000000000000000000000000000000000000') {
                        const currentBalance = holders.get(from) || 0n;
                        const newBalance = currentBalance - value;
                        if (newBalance <= 0) {
                            holders.delete(from);
                        } else {
                            holders.set(from, newBalance);
                        }
                    }
                    
                    if (to && to !== '0x0000000000000000000000000000000000000000') {
                        const currentBalance = holders.get(to) || 0n;
                        holders.set(to, currentBalance + value);
                    }
                }
                
                let holderCount = 0;
                for (const [address, balance] of holders) {
                    if (balance > 0) {
                        holderCount++;
                    }
                }
                
                return holderCount;
            } catch (error) {
                console.error("Error getting holders:", error);
                return 0;
            }
        }

        async function getTodayStatsFromEvents() {
            try {
                const currentBlock = await provider.getBlockNumber();
                const oneDayBlocks = 7200;
                const fromBlock = Math.max(0, currentBlock - oneDayBlocks);
                
                const buyFilter = sigmaContract.filters.TokensBought();
                const sellFilter = sigmaContract.filters.TokensSold();
                const lapseFilter = sigmaContract.filters.IncomeLapsed();
                const referralFilter = sigmaContract.filters.ICOBonusPaid();
                
                const [buyEvents, sellEvents, lapseEvents, referralEvents] = await Promise.all([
                    sigmaContract.queryFilter(buyFilter, fromBlock, 'latest'),
                    sigmaContract.queryFilter(sellFilter, fromBlock, 'latest'),
                    sigmaContract.queryFilter(lapseFilter, fromBlock, 'latest'),
                    sigmaContract.queryFilter(referralFilter, fromBlock, 'latest')
                ]);
                
                let totalBuy = 0;
                let totalSell = 0;
                let totalIncome = 0;
                
                for (const event of buyEvents) {
                    const usdtSpent = Number(ethers.formatUnits(event.args.usdtSpent, 6));
                    totalBuy += usdtSpent;
                    totalIncome += usdtSpent * 0.05;
                }
                
                for (const event of sellEvents) {
                    const usdtReceived = Number(ethers.formatUnits(event.args.usdtReceived, 6));
                    totalSell += usdtReceived;
                    totalIncome += usdtReceived * 0.09;
                }
                
                realStats.todayBuy = totalBuy;
                realStats.todaySell = totalSell;
                realStats.todayIncome = totalIncome;
                realStats.todayLaps = lapseEvents.length;
                realStats.newReferrals = referralEvents.length;
                
            } catch (error) {
                console.error("Error fetching events:", error);
            }
        }

        async function loadRealDashboardData() {
            const dashboard = document.getElementById('dashboardContent');
            dashboard.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p>Fetching Real Data from Blockchain...</p></div>';
            
            try {
                const totalSupplyRaw = await sigmaContract.totalSupply();
                realStats.totalSupply = parseFloat(ethers.formatEther(totalSupplyRaw));
                
                const treasuryRaw = await usdtContract.balanceOf(SIGMA_ADDRESS);
                realStats.treasuryBalance = parseFloat(ethers.formatUnits(treasuryRaw, 6));
                
                const rateRaw = await sigmaContract.getCurrentBuyRate();
                realStats.currentRate = parseFloat(ethers.formatUnits(rateRaw, 6));
                
                realStats.totalHolders = await getTotalHoldersFromEvents();
                
                await getTodayStatsFromEvents();
                
                renderDashboard();
                
            } catch (error) {
                console.error("Error loading data:", error);
                dashboard.innerHTML = `
                    <div class="access-denied">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h2>Error Loading Data</h2>
                        <p>${error.message}</p>
                        <button class="action-btn-sm" style="margin-top: 24px;" onclick="loadRealDashboardData()">
                            <i class="fas fa-sync-alt"></i> Retry
                        </button>
                    </div>
                `;
            }
        }

        function renderDashboard() {
            const dashboard = document.getElementById('dashboardContent');
            
            dashboard.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                        <div class="stat-title">TOTAL SUPPLY</div>
                        <div class="stat-value">${realStats.totalSupply.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 2})} <span style="font-size: 12px;">SIG6</span></div>
                        <div class="stat-sub">Circulating Supply</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-landmark"></i></div>
                        <div class="stat-title">TREASURY BALANCE</div>
                        <div class="stat-value">${realStats.treasuryBalance.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} <span style="font-size: 12px;">USDT</span></div>
                        <div class="stat-sub">Contract USDT Balance</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-users"></i></div>
                        <div class="stat-title">TOTAL HOLDERS</div>
                        <div class="stat-value">${realStats.totalHolders.toLocaleString()}</div>
                        <div class="stat-sub">Unique SIG6 Holders</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-chart-simple"></i></div>
                        <div class="stat-title">CURRENT RATE</div>
                        <div class="stat-value">${realStats.currentRate.toFixed(6)} <span style="font-size: 12px;">USDT</span></div>
                        <div class="stat-sub">SIG6 / USDT</div>
                    </div>
                </div>

                <div class="actions-section">
                    <div class="section-title">
                        <i class="fas fa-bolt"></i>
                        <span>QUICK ACTIONS</span>
                    </div>
                    <div class="actions-grid">
                        <button class="action-btn-sm" onclick="window.location.href='migrate.html'">
                            <i class="fas fa-user-plus"></i> Migrate User
                        </button>
                        <button class="action-btn-sm" onclick="window.location.href='treasury.html'">
                            <i class="fas fa-coins"></i> Add to Treasury
                        </button>
                        <button class="action-btn-sm" onclick="loadRealDashboardData()">
                            <i class="fas fa-sync-alt"></i> Refresh Data
                        </button>
                    </div>
                </div>

                <div class="daily-stats">
                    <h3><i class="fas fa-calendar-day"></i> TODAY'S ACTIVITY <span style="font-size: 11px; color: var(--text-muted);">(Last 24 Hours)</span></h3>
                    <div class="daily-grid">
                        <div class="daily-item">
                            <div class="daily-label"><i class="fas fa-arrow-up"></i> BUY VOLUME</div>
                            <div class="daily-value">${realStats.todayBuy.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} <span class="daily-unit">USDT</span></div>
                        </div>
                        <div class="daily-item">
                            <div class="daily-label"><i class="fas fa-arrow-down"></i> SELL VOLUME</div>
                            <div class="daily-value">${realStats.todaySell.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} <span class="daily-unit">USDT</span></div>
                        </div>
                        <div class="daily-item">
                            <div class="daily-label"><i class="fas fa-chart-line"></i> INCOME GENERATED</div>
                            <div class="daily-value">${realStats.todayIncome.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} <span class="daily-unit">USDT</span></div>
                        </div>
                        <div class="daily-item">
                            <div class="daily-label"><i class="fas fa-exclamation-triangle"></i> INCOME LAPSED</div>
                            <div class="daily-value">${realStats.todayLaps} <span class="daily-unit">Events</span></div>
                        </div>
                        <div class="daily-item">
                            <div class="daily-label"><i class="fas fa-user-plus"></i> NEW REFERRALS</div>
                            <div class="daily-value">+${realStats.newReferrals}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        createParticles();
        
        window.onload = async () => {
            if (window.ethereum) {
                provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_accounts", []);
                if (accounts.length > 0) {
                    userAddress = accounts[0].toLowerCase();
                    signer = await provider.getSigner();
                    sigmaContract = new ethers.Contract(SIGMA_ADDRESS, SIGMA_ABI, signer);
                    
                    const contractCreator = await sigmaContract.creator();
                    isCreator = userAddress === contractCreator.toLowerCase();
                    
                    updateUIForCreator();
                    
                    if (isCreator) {
                        await loadRealDashboardData();
                    } else {
                        showAccessDenied();
                    }
                } else {
                    showConnectPrompt();
                }
            } else {
                showConnectPrompt();
            }
        };
    </script>
</body>
</html>
