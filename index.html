<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SIGMA SIX | ADMIN DASHBOARD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00ffcc;
            --primary-dark: #00ccaa;
            --secondary: #9d4edd;
            --secondary-dark: #7b2cbf;
            --bg-dark: #0a0b10;
            --bg-card: #0f1119;
            --bg-elevated: #151823;
            --text: #ffffff;
            --text-muted: #8b8d9b;
            --border: rgba(0, 255, 204, 0.2);
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff4d4d;
            --info: #3b82f6;
            --gradient: linear-gradient(135deg, #00ffcc, #9d4edd, #ff2a6d);
            --gradient-gold: linear-gradient(135deg, #ffd700, #ffaa00, #ff8c00);
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Premium Animated Background */
        .admin-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .admin-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(0,255,204,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(157,78,221,0.08) 0%, transparent 50%);
            animation: bgPulse 10s ease-in-out infinite;
        }

        .admin-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,255,204,0.03) 2px, rgba(0,255,204,0.03) 4px),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(157,78,221,0.03) 2px, rgba(157,78,221,0.03) 4px);
            pointer-events: none;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* Floating Particles */
        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle-admin {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.4;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* Rainbow Border */
        .rainbow-border {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient);
            background-size: 400% 400%;
            animation: rainbow 8s ease infinite;
            z-index: 1000;
        }

        @keyframes rainbow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Main Container */
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 24px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo-area h1 {
            font-size: 28px;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-area p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .wallet-status {
            background: var(--bg-card);
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .creator-badge {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            color: #000;
        }

        .wallet-address {
            font-family: monospace;
            font-size: 14px;
            color: var(--primary);
        }

        .disconnect-btn {
            background: rgba(255,77,77,0.2);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .disconnect-btn:hover {
            background: var(--danger);
            color: #fff;
        }

        /* Stats Grid - Premium Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,255,204,0.1);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--gradient);
            transform: scaleX(0);
            transition: transform 0.4s;
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-icon {
            font-size: 32px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            line-height: 1.2;
        }

        .stat-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* Quick Actions */
        .actions-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: var(--primary);
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .action-card {
            background: linear-gradient(135deg, rgba(0,255,204,0.05), rgba(157,78,221,0.05));
            border-radius: 20px;
            padding: 28px;
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .action-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0,255,204,0.15);
        }

        .action-card i {
            font-size: 48px;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }

        .action-card h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .action-card p {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .action-btn {
            background: var(--gradient);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 14px;
            color: #000;
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,255,204,0.4);
        }

        /* Daily Stats */
        .daily-stats {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 28px;
            border: 1px solid var(--border);
        }

        .daily-stats h3 {
            font-size: 18px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .daily-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .daily-item {
            background: var(--bg-elevated);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }

        .daily-item:hover {
            transform: translateY(-3px);
            border: 1px solid var(--primary);
        }

        .daily-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .daily-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
        }

        .daily-unit {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: 4px;
        }

        /* Access Denied */
        .access-denied {
            text-align: center;
            padding: 80px 20px;
            background: var(--bg-card);
            border-radius: 32px;
            border: 1px solid var(--border);
        }

        .access-denied i {
            font-size: 80px;
            color: var(--danger);
            margin-bottom: 24px;
        }

        .access-denied h2 {
            font-size: 28px;
            margin-bottom: 12px;
        }

        .access-denied p {
            color: var(--text-muted);
        }

        /* Loading */
        .loading-spinner {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .admin-footer {
            margin-top: 40px;
            padding-top: 20px;
            text-align: center;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .admin-container {
                padding: 20px 16px;
            }
            .admin-header {
                flex-direction: column;
                text-align: center;
            }
            .stat-value {
                font-size: 24px;
            }
            .daily-value {
                font-size: 22px;
            }
            .action-card {
                padding: 20px;
            }
            .action-card i {
                font-size: 36px;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .actions-grid {
                grid-template-columns: 1fr;
            }
            .daily-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card, .action-card, .daily-item {
            animation: fadeInUp 0.6s ease forwards;
        }

        .stat-card:nth-child(1) { animation-delay: 0.05s; }
        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.15s; }
        .stat-card:nth-child(4) { animation-delay: 0.2s; }
    </style>
</head>
<body>
    <div class="admin-bg"></div>
    <div class="floating-particles" id="particles"></div>
    <div class="rainbow-border"></div>

    <div class="admin-container">
        <div class="admin-header">
            <div class="logo-area">
                <h1><i class="fas fa-crown"></i> SIGMA SIX ADMIN</h1>
                <p>Command Center • Premium Dashboard</p>
            </div>
            <div class="wallet-status" id="walletStatus">
                <div class="creator-badge" id="creatorBadge" style="display: none;">
                    <i class="fas fa-key"></i> CREATOR
                </div>
                <span class="wallet-address" id="walletAddress">Not Connected</span>
                <button class="disconnect-btn" id="disconnectBtn" onclick="disconnectWallet()" style="display: none;">
                    <i class="fas fa-sign-out-alt"></i> Disconnect
                </button>
            </div>
        </div>

        <div id="dashboardContent">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Connecting to Blockchain...</p>
            </div>
        </div>

        <div class="admin-footer">
            <p><i class="fas fa-shield-alt"></i> Secure Admin Panel • Only Creator Access</p>
            <p style="margin-top: 8px;">© 2024 SIGMA SIX | All Rights Reserved</p>
        </div>
    </div>

    <script>
        // Contract Configuration
        const SIGMA_ADDRESS = "0x846339d474AE98b219111eb969E27b6317aE5852";
        const USDT_ADDRESS = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";
        
        // Creator Address (from contract)
        const CREATOR_ADDRESS = "0xDf572e4D93582a9b2EEA65BDb0C588FB5fD4EC4b".toLowerCase();

        const SIGMA_ABI = [
            "function totalSupply() view returns (uint256)",
            "function balanceOf(address) view returns (uint256)",
            "function getCurrentBuyRate() view returns (uint256)",
            "function buySigma(uint256 _usdtAmount, address _upline) external",
            "function sellSigma(uint256 _sigmaAmount) external",
            "function transfer(address to, uint256 amount) returns (bool)",
            "function creator() view returns (address)",
            "function usdt() view returns (address)",
            "function users(address) view returns (address upline, uint256 directCount, uint256 lastBuyTimestamp, uint256 totalReferralEarned, uint256 lastActionTime, bool hasBoughtBefore)"
        ];

        const USDT_ABI = [
            "function balanceOf(address) view returns (uint256)",
            "function allowance(address,address) view returns (uint256)",
            "function approve(address,uint256) returns (bool)",
            "function transfer(address,uint256) returns (bool)"
        ];

        // Global variables
        let provider, signer, userAddress;
        let sigmaContract, usdtContract;
        let isCreator = false;
        let allUsers = [];
        
        // Stats storage
        let stats = {
            totalSupply: 0,
            treasuryBalance: 0,
            totalHolders: 0,
            todayBuy: 0,
            todaySell: 0,
            todayIncome: 0,
            todayLaps: 0,
            newReferrals: 0
        };

        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle-admin';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = 15 + Math.random() * 20 + 's';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.width = 2 + Math.random() * 3 + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        // Connect Wallet
        async function connectWallet() {
            if (!window.ethereum) {
                alert("MetaMask not installed! Please install MetaMask.");
                window.open("https://metamask.io/download/", "_blank");
                return;
            }

            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                userAddress = accounts[0].toLowerCase();
                signer = await provider.getSigner();
                
                sigmaContract = new ethers.Contract(SIGMA_ADDRESS, SIGMA_ABI, signer);
                usdtContract = new ethers.Contract(USDT_ADDRESS, USDT_ABI, signer);
                
                // Check if connected wallet is creator
                const contractCreator = await sigmaContract.creator();
                isCreator = userAddress === contractCreator.toLowerCase();
                
                updateUIForCreator();
                
                if (isCreator) {
                    await loadDashboardData();
                } else {
                    showAccessDenied();
                }
                
                // Listen for account changes
                window.ethereum.on('accountsChanged', handleAccountsChanged);
                
            } catch (error) {
                console.error("Connection error:", error);
                alert("Failed to connect: " + error.message);
            }
        }

        function handleAccountsChanged(accounts) {
            if (accounts.length > 0) {
                userAddress = accounts[0].toLowerCase();
                if (userAddress === CREATOR_ADDRESS) {
                    isCreator = true;
                    updateUIForCreator();
                    loadDashboardData();
                } else {
                    isCreator = false;
                    updateUIForCreator();
                    showAccessDenied();
                }
            } else {
                disconnectWallet();
            }
        }

        function updateUIForCreator() {
            const creatorBadge = document.getElementById('creatorBadge');
            const disconnectBtn = document.getElementById('disconnectBtn');
            const walletAddressSpan = document.getElementById('walletAddress');
            
            if (isCreator) {
                creatorBadge.style.display = 'flex';
                disconnectBtn.style.display = 'flex';
                walletAddressSpan.textContent = userAddress.slice(0, 8) + '...' + userAddress.slice(-6);
                walletAddressSpan.style.color = '#00ffcc';
            } else if (userAddress) {
                creatorBadge.style.display = 'none';
                disconnectBtn.style.display = 'flex';
                walletAddressSpan.textContent = userAddress.slice(0, 8) + '...' + userAddress.slice(-6);
                walletAddressSpan.style.color = '#ffaa00';
            } else {
                creatorBadge.style.display = 'none';
                disconnectBtn.style.display = 'none';
                walletAddressSpan.textContent = 'Not Connected';
                walletAddressSpan.style.color = '#8b8d9b';
            }
        }

        function disconnectWallet() {
            userAddress = null;
            isCreator = false;
            updateUIForCreator();
            showConnectPrompt();
        }

        function showConnectPrompt() {
            const dashboard = document.getElementById('dashboardContent');
            dashboard.innerHTML = `
                <div class="access-denied">
                    <i class="fas fa-user-lock"></i>
                    <h2>Admin Access Required</h2>
                    <p>Please connect with the Creator Wallet to access the dashboard</p>
                    <button class="action-btn" style="margin-top: 24px;" onclick="connectWallet()">
                        <i class="fas fa-wallet"></i> Connect Wallet
                    </button>
                </div>
            `;
        }

        function showAccessDenied() {
            const dashboard = document.getElementById('dashboardContent');
            dashboard.innerHTML = `
                <div class="access-denied">
                    <i class="fas fa-ban"></i>
                    <h2>Access Denied</h2>
                    <p>You are not authorized to access this dashboard.</p>
                    <p style="margin-top: 12px; font-size: 13px;">Only the Creator wallet has admin privileges.</p>
                    <button class="action-btn" style="margin-top: 24px; background: var(--danger);" onclick="disconnectWallet()">
                        <i class="fas fa-sign-out-alt"></i> Disconnect
                    </button>
                </div>
            `;
        }

        async function loadDashboardData() {
            const dashboard = document.getElementById('dashboardContent');
            dashboard.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p>Loading Dashboard Data...</p></div>';
            
            try {
                // Fetch total supply
                const totalSupplyRaw = await sigmaContract.totalSupply();
                stats.totalSupply = parseFloat(ethers.formatEther(totalSupplyRaw));
                
                // Fetch treasury balance (USDT balance of contract)
                const treasuryBalanceRaw = await usdtContract.balanceOf(SIGMA_ADDRESS);
                stats.treasuryBalance = parseFloat(ethers.formatUnits(treasuryBalanceRaw, 6));
                
                // Fetch all users and calculate holders
                // Note: This is a simulation - in real scenario, you'd need to iterate through all users
                // For now, we'll fetch a sample or use event logs
                stats.totalHolders = await getTotalHolders();
                
                // For demo - these would come from event logs in production
                stats.todayBuy = await getTodayBuy();
                stats.todaySell = await getTodaySell();
                stats.todayIncome = stats.todayBuy + stats.todaySell;
                stats.todayLaps = 0;
                stats.newReferrals = await getNewReferrals();
                
                renderDashboard();
                
            } catch (error) {
                console.error("Error loading dashboard:", error);
                dashboard.innerHTML = `
                    <div class="access-denied">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h2>Error Loading Data</h2>
                        <p>${error.message}</p>
                        <button class="action-btn" style="margin-top: 24px;" onclick="loadDashboardData()">
                            <i class="fas fa-sync-alt"></i> Retry
                        </button>
                    </div>
                `;
            }
        }

        // Helper functions to get stats (simulated - would use event logs in production)
        async function getTotalHolders() {
            // This would require scanning all users - simplified for demo
            try {
                // For demo, we'll return a sample number
                // In production, you'd maintain a mapping or use events
                return Math.floor(Math.random() * 500) + 100;
            } catch {
                return 0;
            }
        }

        async function getTodayBuy() {
            // Simulate today's buy volume
            return Math.floor(Math.random() * 5000) + 500;
        }

        async function getTodaySell() {
            // Simulate today's sell volume
            return Math.floor(Math.random() * 3000) + 200;
        }

        async function getNewReferrals() {
            // Simulate new referrals today
            return Math.floor(Math.random() * 50) + 5;
        }

        function renderDashboard() {
            const dashboard = document.getElementById('dashboardContent');
            
            dashboard.innerHTML = `
                <!-- Stats Grid -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                        <div class="stat-title">TOTAL SUPPLY</div>
                        <div class="stat-value">${stats.totalSupply.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 2})} <span style="font-size: 14px;">SIG6</span></div>
                        <div class="stat-sub">Circulating Supply</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-landmark"></i></div>
                        <div class="stat-title">TREASURY BALANCE</div>
                        <div class="stat-value">${stats.treasuryBalance.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} <span style="font-size: 14px;">USDT</span></div>
                        <div class="stat-sub">Contract USDT Balance</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-users"></i></div>
                        <div class="stat-title">TOTAL HOLDERS</div>
                        <div class="stat-value">${stats.totalHolders.toLocaleString()}</div>
                        <div class="stat-sub">Unique SIG6 Holders</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-chart-simple"></i></div>
                        <div class="stat-title">CURRENT RATE</div>
                        <div class="stat-value" id="currentRate">--</div>
                        <div class="stat-sub">SIG6 / USDT</div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="actions-section">
                    <div class="section-title">
                        <i class="fas fa-bolt"></i>
                        <span>QUICK ACTIONS</span>
                    </div>
                    <div class="actions-grid">
                        <div class="action-card">
                            <i class="fas fa-user-plus"></i>
                            <h3>Migrate User</h3>
                            <p>Transfer user data from old contract</p>
                            <button class="action-btn" onclick="window.location.href='migrate.html'">
                                <i class="fas fa-arrow-right"></i> Migrate
                            </button>
                        </div>
                        <div class="action-card">
                            <i class="fas fa-coins"></i>
                            <h3>Add to Treasury</h3>
                            <p>Add USDT to contract treasury</p>
                            <button class="action-btn" onclick="window.location.href='treasury.html'">
                                <i class="fas fa-plus-circle"></i> Add Funds
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Daily Stats -->
                <div class="daily-stats">
                    <h3><i class="fas fa-calendar-day"></i> TODAY'S ACTIVITY</h3>
                    <div class="daily-grid">
                        <div class="daily-item">
                            <div class="daily-label"><i class="fas fa-arrow-up"></i> BUY VOLUME</div>
                            <div class="daily-value">${stats.todayBuy.toLocaleString()} <span class="daily-unit">USDT</span></div>
                        </div>
                        <div class="daily-item">
                            <div class="daily-label"><i class="fas fa-arrow-down"></i> SELL VOLUME</div>
                            <div class="daily-value">${stats.todaySell.toLocaleString()} <span class="daily-unit">USDT</span></div>
                        </div>
                        <div class="daily-item">
                            <div class="daily-label"><i class="fas fa-chart-line"></i> INCOME GENERATED</div>
                            <div class="daily-value">${stats.todayIncome.toLocaleString()} <span class="daily-unit">USDT</span></div>
                        </div>
                        <div class="daily-item">
                            <div class="daily-label"><i class="fas fa-exclamation-triangle"></i> INCOME LAPSED</div>
                            <div class="daily-value">${stats.todayLaps.toLocaleString()} <span class="daily-unit">SIG6</span></div>
                        </div>
                        <div class="daily-item">
                            <div class="daily-label"><i class="fas fa-user-plus"></i> NEW REFERRALS</div>
                            <div class="daily-value">+${stats.newReferrals.toLocaleString()}</div>
                        </div>
                    </div>
                </div>
            `;
            
            // Fetch current rate
            updateCurrentRate();
        }

        async function updateCurrentRate() {
            try {
                const rate = await sigmaContract.getCurrentBuyRate();
                const rateValue = parseFloat(ethers.formatUnits(rate, 6));
                const rateElement = document.getElementById('currentRate');
                if (rateElement) {
                    rateElement.textContent = rateValue.toFixed(6) + ' USDT';
                }
            } catch (error) {
                console.error("Error fetching rate:", error);
                const rateElement = document.getElementById('currentRate');
                if (rateElement) {
                    rateElement.textContent = '--';
                }
            }
        }

        // Auto-refresh every 30 seconds
        let refreshInterval;
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                if (isCreator && userAddress === CREATOR_ADDRESS) {
                    loadDashboardData();
                }
            }, 30000);
        }

        // Initialize
        createParticles();
        
        // Auto-connect if already connected
        window.onload = async () => {
            if (window.ethereum) {
                provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_accounts", []);
                if (accounts.length > 0) {
                    userAddress = accounts[0].toLowerCase();
                    signer = await provider.getSigner();
                    sigmaContract = new ethers.Contract(SIGMA_ADDRESS, SIGMA_ABI, signer);
                    
                    const contractCreator = await sigmaContract.creator();
                    isCreator = userAddress === contractCreator.toLowerCase();
                    
                    updateUIForCreator();
                    
                    if (isCreator) {
                        await loadDashboardData();
                        startAutoRefresh();
                    } else {
                        showAccessDenied();
                    }
                } else {
                    showConnectPrompt();
                }
            } else {
                showConnectPrompt();
            }
        };
    </script>
</body>
</html>
